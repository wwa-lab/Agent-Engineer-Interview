name: Link and structure check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  internal-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: bash scripts/check-links.sh
      - run: python scripts/validate-structure.py

  external-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress '**/*.md'
          fail: true
